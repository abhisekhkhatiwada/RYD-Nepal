name: Deploy to GitHub Pages (DISABLED)

# This workflow is intentionally disabled. The site deploys to Cloudflare Pages
# via deploy-cloudflare.yml. The old `push` trigger has been removed and the
# jobs below are guarded with `if: ${{ false }}`, so this never runs — even if
# someone clicks "Run workflow" manually. Kept for reference, not deleted.
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    if: ${{ false }}  # disabled — see header comment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    if: ${{ false }}  # disabled — see header comment
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
